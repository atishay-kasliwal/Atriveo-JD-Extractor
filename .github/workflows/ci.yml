name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Typecheck server ─────────────────────────────────────────────────────────
  typecheck:
    name: Typecheck & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm install

      - name: Typecheck server
        run: npx tsc -p server/tsconfig.json --noEmit

  # ── Build Docker image ───────────────────────────────────────────────────────
  build-docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: typecheck
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push server image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/atriveo-jd-extractor:latest
            ghcr.io/${{ github.repository_owner }}/atriveo-jd-extractor:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push scraper image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/Dockerfile.scraper
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/atriveo-jd-extractor-scraper:latest
            ghcr.io/${{ github.repository_owner }}/atriveo-jd-extractor-scraper:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Python scraper lint ──────────────────────────────────────────────────────
  scraper-lint:
    name: Scraper (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install -r scraper/requirements.txt

      - name: Syntax check
        run: python -m py_compile scraper/models.py scraper/scorer.py scraper/deduplicator.py scraper/main.py scraper/sources/greenhouse.py scraper/sources/lever.py scraper/sources/linkedin.py
