apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: atriveo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
    spec:
      containers:
        - name: ollama
          image: ollama/ollama:latest
          ports:
            - containerPort: 11434
          volumeMounts:
            - name: ollama-models
              mountPath: /root/.ollama
          resources:
            requests:
              cpu: "1000m"
              memory: "8Gi"
            limits:
              cpu: "4000m"
              memory: "16Gi"
          # Pull the model on startup if not present
          lifecycle:
            postStart:
              exec:
                command: ["/bin/sh", "-c", "ollama pull gemma3:12b || true"]
      volumes:
        - name: ollama-models
          persistentVolumeClaim:
            claimName: ollama-models-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ollama-models-pvc
  namespace: atriveo
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 30Gi   # gemma3:12b is ~8GB, leave room for multiple models
---
apiVersion: v1
kind: Service
metadata:
  name: ollama
  namespace: atriveo
spec:
  selector:
    app: ollama
  ports:
    - port: 11434
      targetPort: 11434
