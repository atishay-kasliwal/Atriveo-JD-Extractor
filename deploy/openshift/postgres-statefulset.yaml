apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: atriveo
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          env:
            - name: POSTGRES_USER
              value: atriveo
            - name: POSTGRES_DB
              value: atriveo
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: atriveo-secrets
                  key: POSTGRES_PASSWORD
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
            - name: init-sql
              mountPath: /docker-entrypoint-initdb.d
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
      volumes:
        - name: init-sql
          configMap:
            name: postgres-init
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: atriveo
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
  clusterIP: None   # headless for StatefulSet DNS
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init
  namespace: atriveo
data:
  init.sql: |
    -- loaded from migrations/postgres/0001_init.sql at deploy time
    -- run: kubectl create configmap postgres-init --from-file=migrations/postgres/0001_init.sql -n atriveo
